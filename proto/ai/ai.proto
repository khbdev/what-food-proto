syntax = "proto3";

package ai;

option go_package = "ai-service/proto";

service AiService {
  rpc AnalyzeMeal (MealRequest) returns (MealResponse);
  rpc AnalyzeNutrition (NutritionRequest) returns (NutritionResponse);
}

// Meal
message MealRequest {
  string name = 1;
  string description = 2;
  string country = 3;
  string meal_time = 4;
  float kcal = 5;
  float protein = 6;
  float fat = 7;
  float carbs = 8;
  int32 portion = 9;
}

message Ingredient {
  string name = 1;
  string amount = 2;
}

message MealResponse {
  int32 portion = 1;
  float total_kcal = 2;
  int32 cooking_time_minutes = 3;
  repeated Ingredient ingredients = 4;
  repeated string steps = 5;
}

// Nutrition
message NutritionRequest {
  string period = 1;
  float avg_kcal = 2;
  float avg_protein = 3;
  float avg_fat = 4;
  float avg_carbs = 5;
}

message NutritionResponse {
  string feedback = 1;
  string level = 2;
}