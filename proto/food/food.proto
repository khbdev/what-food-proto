syntax = "proto3";

package food;

option go_package = "food-service/genproto/food";


// ======================
// 🔹 SERVICES
// ======================

service RecipeService {
  rpc CreateRecipe (CreateRecipeRequest) returns (Empty);
  rpc GetRecipeByID (GetByIDRequest) returns (RecipeResponse);
  rpc GetAllRecipes (Empty) returns (RecipeListResponse);
  rpc UpdateRecipe (UpdateRecipeRequest) returns (Empty);
  rpc DeleteRecipe (GetByIDRequest) returns (Empty);
}

service SaladService {
  rpc CreateSalad (CreateSaladRequest) returns (Empty);
  rpc GetSaladByID (GetByIDRequest) returns (SaladResponse);
  rpc GetAllSalads (Empty) returns (SaladListResponse);
  rpc UpdateSalad (UpdateSaladRequest) returns (Empty);
  rpc DeleteSalad (GetByIDRequest) returns (Empty);
}

service RestaurantService {
  rpc CreateRestaurant (CreateRestaurantRequest) returns (CreateRestaurantResponse);
  rpc GetRestaurantByID (GetByIDRequest) returns (RestaurantResponse);
  rpc GetAllRestaurants (Empty) returns (RestaurantListResponse);
  rpc UpdateRestaurant (UpdateRestaurantRequest) returns (Empty);
  rpc DeleteRestaurant (GetByIDRequest) returns (Empty);
}

service FoodFilterService {
  rpc FilterFood (FoodFilterRequest) returns (FoodListResponse);
}


// ======================
// 🔹 COMMON
// ======================

message Empty {}

message GetByIDRequest {
  int64 id = 1;
}


// ======================
// 🔹 RECIPE
// ======================

message Recipe {
  int64 id = 1;
  int64 restaurant_id = 2;

  string name = 3;
  string description = 4;

  string image_url = 5;
  string video_url = 6;

  string country = 7;
  string meal_time = 8;

  int32 kcal = 9;
  double protein = 10;
  double fat = 11;
  double carbs = 12;
}

message CreateRecipeRequest {
  Recipe recipe = 1;
}

message UpdateRecipeRequest {
  Recipe recipe = 1;
}

message RecipeResponse {
  Recipe recipe = 1;
}

message RecipeListResponse {
  repeated Recipe recipes = 1;
}


// ======================
// 🔹 SALAD
// ======================

message Salad {
  int64 id = 1;
  int64 restaurant_id = 2;

  string name = 3;
  string description = 4;

  string image_url = 5;
  string video_url = 6;

  string country = 7;
  string meal_time = 8;

  int32 kcal = 9;
  double protein = 10;
  double fat = 11;
  double carbs = 12;
}

message CreateSaladRequest {
  Salad salad = 1;
}

message UpdateSaladRequest {
  Salad salad = 1;
}

message SaladResponse {
  Salad salad = 1;
}

message SaladListResponse {
  repeated Salad salads = 1;
}


// ======================
// 🔹 RESTAURANT
// ======================

message Restaurant {
  int64 id = 1;
  string restaurant_name = 2;
  string description = 3;
  string image_url = 4;
}

message CreateRestaurantRequest {
  string restaurant_name = 1;
  string description = 2;
  string image_url = 3;
}

message CreateRestaurantResponse {
  int64 id = 1;
}

message UpdateRestaurantRequest {
  Restaurant restaurant = 1;
}

message RestaurantResponse {
  Restaurant restaurant = 1;
}

message RestaurantListResponse {
  repeated Restaurant restaurants = 1;
}


// ======================
// 🔹 FILTER
// ======================

message FoodFilterRequest {
  string country = 1;
  string meal_time = 2;
  int32 max_kcal = 3;
  bool include_salads = 4;
}

message FoodItem {
  int64 id = 1;
  string type = 2; // recipe | salad

  int64 restaurant_id = 3;

  string name = 4;
  string description = 5;

  string image_url = 6;
  string video_url = 7;

  string country = 8;
  string meal_time = 9;

  int32 kcal = 10;
  double protein = 11;
  double fat = 12;
  double carbs = 13;
}

message FoodListResponse {
  repeated FoodItem items = 1;
}