syntax = "proto3";

package auth;

option go_package = "github.com/khbdev/what-food-proto/proto/authpb;authpb";

// =========================
// AUTH SERVICE
// =========================
service AuthService {

  // Register user (step 1)
  rpc Register(RegisterRequest) returns (SimpleResponse);

  // Login user (send OTP)
  rpc Login(LoginRequest) returns (SimpleResponse);

  // Verify OTP (final step)
  rpc VerifyOTP(VerifyRequest) returns (AuthResponse);
}


message RegisterRequest {
  string full_name = 1;
  string phone     = 2;
  int32  age       = 3;
  string address   = 4;
}

message LoginRequest {
  string phone = 1;
}

message VerifyRequest {
  int64 otp   = 1;
}

message SimpleResponse {
  string message = 1;
}

message AuthResponse {
  string access_token  = 1;
  string refresh_token = 2;
}
