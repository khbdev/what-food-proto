syntax = "proto3";

package auth;

option go_package = "github.com/khbdev/what-food-proto/proto/authpb;authpb";

// =========================
// AUTH SERVICE
// =========================
service AuthService {

  rpc Register(RegisterRequest) returns (SimpleResponse);

  rpc Login(LoginRequest) returns (SimpleResponse);

  rpc VerifyOTP(VerifyRequest) returns (AuthResponse);

  rpc RefreshToken(RefreshRequest) returns (AuthResponse);

  rpc Logout(LogoutRequest) returns (SimpleResponse);
}

// =========================
// REQUESTS
// =========================

message RegisterRequest {
  string full_name = 1;
  string phone     = 2;
  int32  age       = 3;
  string address   = 4;
}

message LoginRequest {
  string phone = 1;
}

message VerifyRequest {
  string phone = 1;
  int64  otp   = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

// =========================
// RESPONSES
// =========================

message SimpleResponse {
  string message = 1;
}

message AuthResponse {
  string access_token  = 1;
  string refresh_token = 2;
}