syntax = "proto3";

package category;

option go_package = "github.com/khbdev/what-food-proto/proto/categorypb;categorypb";

// ===== MODELS =====

message Category {
  int64 id = 1;
  string name = 2;
  string created_at = 3;
}

message Ingredient {
  int64 id = 1;
  string name = 2;
  double quantity = 3;
}

message CategoryWithIngredients {
  int64 category_id = 1;
  string name = 2;
  repeated Ingredient items = 3;
}

// ===== REQUESTS =====

message CreateCategoryRequest {
  string name = 1;
}

message GetByIDRequest {
  int64 id = 1;
}

message GetAllRequest {}

message UpdateCategoryRequest {
  int64 id = 1;
  string name = 2;
}

message DeleteCategoryRequest {
  int64 id = 1;
}

// Get category by category_id with ingredients filtered by user_id
message GetByIDWithUserProductsRequest {
  int64 category_id = 1;
  int64 user_id = 2;
}

// ===== RESPONSES =====

message CategoryResponse {
  Category category = 1;
}

message CategoryListResponse {
  repeated Category categories = 1;
}

message CategoryWithIngredientsResponse {
  CategoryWithIngredients category = 1;
}

message CategoryWithIngredientsListResponse {
  repeated CategoryWithIngredients categories = 1;
}

message Empty {}

// ===== SERVICE =====

service CategoryService {

  // Create category
  rpc Create(CreateCategoryRequest)
      returns (CategoryResponse);

  // Get category with all ingredients
  rpc GetByID(GetByIDRequest)
      returns (CategoryWithIngredientsResponse);

  // Get only category
  rpc GetCategoryByID(GetByIDRequest)
      returns (CategoryResponse);

  // Get category with ingredients by user
  rpc GetByIDWithUserProducts(GetByIDWithUserProductsRequest)
      returns (CategoryWithIngredientsResponse);

  // Get all categories
  rpc GetAll(GetAllRequest)
      returns (CategoryListResponse);

  // Update category
  rpc Update(UpdateCategoryRequest)
      returns (CategoryResponse);

  // Delete category
  rpc Delete(DeleteCategoryRequest)
      returns (Empty);
}