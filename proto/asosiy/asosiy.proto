syntax = "proto3";

package asosiy;

option go_package = "github.com/khbdev/what-food-proto/proto/asosiy;asosiypb";

// =========================
// SERVICE
// =========================

service FoodService {
  rpc FilterFood (FoodFilterRequest) returns (FoodListResponse);
  rpc GetFoodDetail (FoodDetailRequest) returns (FoodDetailResponse);
}

// =========================
// FILTER REQUEST
// =========================

message FoodFilterRequest {
  string country = 1;
  string meal_time = 2;
  bool has_salad = 3;
  int32 kcal_limit = 4;
}

// =========================
// LIST RESPONSE
// =========================

message FoodItem {
  int64 id = 1;
  string type = 2;
  int64 restaurant_id = 3;
  string name = 4;
  string description = 5;
  string image_url = 6;
  string video_url = 7;
  string country = 8;
  string meal_time = 9;
  int32 kcal = 10;
  double protein = 11;
  double fat = 12;
  double carbs = 13;
}

message FoodListResponse {
  repeated FoodItem items = 1;
}

// =========================
// DETAIL REQUEST
// =========================

message FoodDetailRequest {
  int64 id = 1;
  string type = 2;
  int32 portion = 3;
  int64 user_id = 4;
}

// =========================
// DETAIL RESPONSE
// =========================

message Ingredient {
  string name = 1;
  string amount = 2;
}

message FoodDetailResponse {
  // food ma'lumotlari
  int64 id = 1;
  string type = 2;
  int64 restaurant_id = 3;
  string name = 4;
  string description = 5;
  string image_url = 6;
  string video_url = 7;
  string country = 8;
  string meal_time = 9;
  int32 kcal = 10;
  double protein = 11;
  double fat = 12;
  double carbs = 13;

  // AI ma'lumotlari
  int32 portion = 14;
  float total_kcal = 15;
  int32 cooking_time_minutes = 16;
  repeated Ingredient ingredients = 17;
  repeated string steps = 18;
}